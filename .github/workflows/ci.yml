name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: ['17', '21']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: '${{ matrix.java-version }}'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run fast tests
        run: ./gradlew :premium-intellij-plugin:runFastTests

      - name: Run build validation tests
        run: ./gradlew :premium-intellij-plugin:validateBuildConfiguration

      - name: Run licensing model enforcement tests
        run: ./gradlew :premium-intellij-plugin:test --tests "*LicensingModelEnforcementTest*"

      - name: Run module boundary validation
        run: ./gradlew validateModuleBoundaries

      - name: Run unit tests
        run: ./gradlew test

      - name: Run integration tests
        run: ./gradlew :premium-intellij-plugin:runIntegrationTests

      - name: Run marketplace validation tests
        run: ./gradlew :premium-intellij-plugin:validateMarketplaceRequirements

      - name: Run all validation checks
        run: ./gradlew validateAllWithBuildTests

      - name: Generate test reports
        run: ./gradlew test jacocoTestReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java${{ matrix.java-version }}
          path: |
            **/build/test-results/
            **/build/reports/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload coverage reports
        if: matrix.java-version == '21'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            **/build/reports/jacoco/
          retention-days: 7
          if-no-files-found: ignore

  build:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build all modules
        run: ./gradlew build -x test

      - name: Build IntelliJ plugin
        run: ./gradlew :premium-intellij-plugin:buildPlugin

      - name: Build MCP server
        run: ./gradlew :community-mcp-server:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/build/libs/
            **/build/distributions/
            premium-intellij-plugin/build/distributions/
          retention-days: 7
          if-no-files-found: ignore

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

      - name: Run SpotBugs
        run: ./gradlew spotbugsMain spotbugsTest

      - name: Run PMD
        run: ./gradlew pmdMain pmdTest

      - name: Upload quality reports
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: |
            **/build/reports/checkstyle/
            **/build/reports/spotbugs/
            **/build/reports/pmd/
          retention-days: 7
          if-no-files-found: ignore

  test-intellij-matrix:
    name: IntelliJ Platform Matrix Tests
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        intellij-version: ['2023_1', '2024_1', '2025_1', '2026_1']
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run IntelliJ platform tests for version ${{ matrix.intellij-version }}
        run: ./gradlew :premium-intellij-plugin:testIntelliJ_${{ matrix.intellij-version }} -Djakarta.migration.mode=dev --no-configuration-cache

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intellij-matrix-results-${{ matrix.intellij-version }}
          path: |
            **/build/test-results/
            **/build/reports/tests/
          retention-days: 7
          if-no-files-found: ignore
