name: Build and Publish IntelliJ Plugin

on:
  push:
    branches:
      - main
    paths:
      - 'premium-intellij-plugin/**'
      - 'community-core-engine/**'
      - 'premium-core-engine/**'
  pull_request:
    branches:
      - main
    paths:
      - 'premium-intellij-plugin/**'
      - 'community-core-engine/**'
      - 'premium-core-engine/**'

env:
  JAVA_HOME: 'C:\Program Files\Java\jdk-21.0.10'

jobs:
  build:
    name: Build Plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: ./premium-intellij-plugin
        run: chmod +x gradlew

      - name: Build with Gradle
        working-directory: ./premium-intellij-plugin
        run: ./gradlew build

      - name: Run Tests
        working-directory: ./premium-intellij-plugin
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin-test-results
          path: premium-intellij-plugin/build/reports/tests/test/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload plugin
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin
          path: premium-intellij-plugin/build/distributions/*.zip
          retention-days: 7

  publish:
    name: Publish Plugin
    needs: build
    runs-on: ubuntu-latest
    # Only publish when pushed to main (not for PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        working-directory: ./premium-intellij-plugin
        run: chmod +x gradlew

      - name: Download plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: intellij-plugin
          path: premium-intellij-plugin/build/distributions/

      - name: Publish Plugin
        working-directory: ./premium-intellij-plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          PLUGIN_ID: ${{ secrets.PLUGIN_ID }}
        run: |
          ./gradlew publishPlugin \
            -Dpublish.token=$PUBLISH_TOKEN \
            -Dpublish.pluginId=$PLUGIN_ID

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: premium-intellij-plugin/build/distributions/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
