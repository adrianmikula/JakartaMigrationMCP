# mise-en-place (mise) configuration
# Tool version management and project setup
# Install mise: https://mise.jdx.dev/getting-started.html

[tools]
# Java 21 - Required for the project
java = "21.0.0"

# Gradle - Build tool (cross-platform)
gradle = "8.5"

# Node.js - Required for frontend development
node = "20.11.0"

# Docker - For containerized services
# Note: Docker version managed by system, not mise

# Ollama - LLM runtime
# Note: Ollama installed separately, not via mise

[env]
# Project-specific environment variables
# These are loaded when entering the project directory

# Database Configuration
DB_USERNAME = "postgres"
DB_PASSWORD = "postgres"

# Redis Configuration  
REDIS_HOST = "localhost"
REDIS_PORT = "6379"

# Ollama Configuration
OLLAMA_BASE_URL = "http://localhost:11434"
OLLAMA_MODEL = "deepseek-coder:6.7b"

# Repository Clone Path
REPO_CLONE_PATH = "./repos"

# Essential development workflow tasks
# For complete command reference, see COMMANDS.md

[tasks.setup]
description = "Full project setup - installs mise, tools, and starts services"
# Note: This task is typically run via the setup scripts which handle mise installation
# The scripts then call mise tasks for the actual setup work
run = "echo 'Please run: ./scripts/setup.ps1 (Windows) or ./scripts/setup.sh (Linux/Mac)'"

[tasks.start-services]
description = "Start Docker services (PostgreSQL and Redis)"
run_windows = "powershell -File scripts/start-services.ps1"
run = "bash scripts/start-services.sh"

[tasks.stop-services]
description = "Stop Docker services"
run_windows = "powershell -File scripts/stop-services.ps1"
run = "bash scripts/stop-services.sh"

# Free Modules Build Tasks (Apache 2.0)

[tasks.build]
description = "Build all modules (without tests)"
run_windows = "gradlew.bat :community-core-engine:compileJava :community-mcp-server:compileJava :premium-core-engine:compileJava :premium-mcp-server:compileJava :premium-intellij-plugin:compileJava"
run = "gradle :community-core-engine:compileJava :community-mcp-server:compileJava :premium-core-engine:compileJava :premium-mcp-server:compileJava :premium-intellij-plugin:compileJava"

[tasks.build-all]
description = "Build all modules with tests"
run_windows = "gradlew.bat build -Djakarta.migration.mode=dev"
run = "gradle build -Djakarta.migration.mode=dev"

[tasks.test]
description = "Run tests for all modules"
run_windows = "gradlew.bat test -Djakarta.migration.mode=dev"
run = "gradle test -Djakarta.migration.mode=dev --no-configuration-cache"

[tasks.run]
description = "Run the community MCP server application"
run_windows = "gradlew.bat :community-mcp-server:bootRun"
run = "gradle :community-mcp-server:bootRun"

[tasks.assembly]
description = "Build fat JAR for MCP server (for release)"
run_windows = "gradlew.bat :community-mcp-server:bootJar"
run = "gradle :community-mcp-server:bootJar"

[tasks.clean]
description = "Clean build artifacts"
run_windows = "gradlew.bat clean"
run = "gradle clean"

# Individual Module Build Tasks

[tasks.build-core]
description = "Build community-core-engine module"
run_windows = "gradlew.bat :community-core-engine:compileJava"
run = "gradle :community-core-engine:compileJava"

[tasks.build-server]
description = "Build community-mcp-server module"
run_windows = "gradlew.bat :community-mcp-server:compileJava"
run = "gradle :community-mcp-server:compileJava"

[tasks.build-plugin]
description = "Build premium-intellij-plugin module"
run_windows = "gradlew.bat :premium-intellij-plugin:compileJava"
run = "gradle :premium-intellij-plugin:compileJava"

# Docker Tasks

[tasks.docker-logs]
description = "View Docker service logs (follow mode)"
run = "docker compose logs -f"

[tasks.docker-ps]
description = "Check Docker services status"
run = "docker compose ps"

[tasks.db-connect]
description = "Connect to PostgreSQL database"
run = "docker exec -it jakarta-migration-postgres psql -U postgres -d jakarta_migration"

[tasks.redis-connect]
description = "Connect to Redis CLI"
run = "docker exec -it jakarta-migration-redis redis-cli"

[tasks.health]
description = "Check application health (requires app to be running)"
run = "curl http://localhost:8080/actuator/health"

# Frontend Development Tasks

[tasks.frontend-install]
description = "Install frontend dependencies"
run = "cd frontend && npm install"

[tasks.frontend-dev]
description = "Start frontend development server (Vite)"
run = "cd frontend && npm run dev"

[tasks.frontend-build]
description = "Build frontend for production"
run = "cd frontend && npm run build"

[tasks.frontend-preview]
description = "Preview production build locally"
run = "cd frontend && npm run preview"

[tasks.frontend-clean]
description = "Clean frontend build artifacts and node_modules"
run_windows = "powershell -c 'if (Test-Path \"frontend\\node_modules\") { Remove-Item -Recurse -Force \"frontend\\node_modules\" }; if (Test-Path \"frontend\\dist\") { Remove-Item -Recurse -Force \"frontend\\dist\" }; Write-Host \"Frontend cleaned\"'"
run = "bash -c 'rm -rf frontend/node_modules frontend/dist && echo \"Frontend cleaned\"'"

# Storybook Tasks

[tasks.storybook]
description = "Start Storybook development server (http://localhost:6006)"
run = "cd frontend && npm run storybook"

[tasks.storybook-build]
description = "Build Storybook for static hosting"
run = "cd frontend && npm run build-storybook"

# Premium Modules Build Tasks (Proprietary)

[tasks.build-premium]
description = "Build premium modules (without tests)"
run_windows = "gradlew.bat :premium-core-engine:compileJava :premium-mcp-server:compileJava :premium-intellij-plugin:compileJava"
run = "gradle :premium-core-engine:compileJava :premium-mcp-server:compileJava :premium-intellij-plugin:compileJava"

[tasks.build-premium-all]
description = "Build premium modules with tests"
run_windows = "gradlew.bat :premium-core-engine:build :premium-mcp-server:build :premium-intellij-plugin:build -Djakarta.migration.mode=dev"
run = "gradle :premium-core-engine:build :premium-mcp-server:build :premium-intellij-plugin:build -Djakarta.migration.mode=dev"

[tasks.test-premium]
description = "Run tests for all premium modules"
run_windows = "gradlew.bat :premium-core-engine:test :premium-mcp-server:test :premium-intellij-plugin:test -Djakarta.migration.mode=dev"
run = "gradle :premium-core-engine:test :premium-mcp-server:test :premium-intellij-plugin:test -Djakarta.migration.mode=dev --no-configuration-cache"

[tasks.build-premium-plugin]
description = "Build premium IntelliJ plugin"
run_windows = "gradlew.bat :premium-intellij-plugin:buildPlugin"
run = "gradle :premium-intellij-plugin:buildPlugin"

# Community Modules Build Tasks (Apache 2.0)

[tasks.build-community]
description = "Build community modules (without tests)"
run_windows = "gradlew.bat :community-core-engine:compileJava :community-mcp-server:compileJava"
run = "gradle :community-core-engine:compileJava :community-mcp-server:compileJava"

[tasks.test-community]
description = "Run tests for all community modules"
run_windows = "gradlew.bat :community-core-engine:test :community-mcp-server:test -Djakarta.migration.mode=dev"
run = "gradle :community-core-engine:test :community-mcp-server:test -Djakarta.migration.mode=dev --no-configuration-cache"

# Fast Test Tasks (for quick feedback during development)
[tasks.fast-test]
description = "Run fast tests only (excludes slow tests)"
run_windows = "gradlew.bat :premium-core-engine:fastTest :community-core-engine:fastTest -Djakarta.migration.mode=dev"
run = "gradle :premium-core-engine:fastTest :community-core-engine:fastTest -Djakarta.migration.mode=dev"

[tasks.slow-test]
description = "Run slow integration tests only"
run_windows = "gradlew.bat :premium-core-engine:slowTest :community-core-engine:slowTest -Djakarta.migration.mode=dev"
run = "gradle :premium-core-engine:slowTest :community-core-engine:slowTest -Djakarta.migration.mode=dev"

[tasks.core-test]
description = "Run core tests (excludes slow tests)"
run_windows = "gradlew.bat :premium-core-engine:coreTest -Djakarta.migration.mode=dev"
run = "gradle :premium-core-engine:coreTest -Djakarta.migration.mode=dev"

[tasks.compile-check]
description = "Quick compile check without running tests"
run_windows = "gradlew.bat :premium-core-engine:compileCheck"
run = "gradle :premium-core-engine:compileCheck"

[tasks.fast-compile]
description = "Quick compile check - no tests, just syntax verification"
run_windows = "gradlew.bat compileJava --parallel"
run = "gradle compileJava --parallel"

# Additional Gradle Tasks

[tasks.test-compile]
description = "Compile test sources only"
run_windows = "gradlew.bat compileTestJava"
run = "gradle compileTestJava"

[tasks.check]
description = "Run all checks (including code quality)"
run_windows = "gradlew.bat check -Djakarta.migration.mode=dev"
run = "gradle check -Djakarta.migration.mode=dev --no-configuration-cache"

[tasks.dependencies]
description = "Show dependency tree"
run_windows = "gradlew.bat dependencies"
run = "gradle dependencies"

[tasks.projects]
description = "List all available projects/modules"
run_windows = "gradlew.bat projects"
run = "gradle projects"

[tasks.tasks]
description = "List all available tasks"
run_windows = "gradlew.bat tasks"
run = "gradle tasks"

[tasks.build-deps]
description = "Build with dependencies resolution"
run_windows = "gradlew.bat build --dry-run"
run = "gradle build --dry-run"

[tasks.clean-test]
description = "Clean and run tests (fresh test run)"
run_windows = "gradlew.bat clean test -Djakarta.migration.mode=dev"
run = "gradle clean test -Djakarta.migration.mode=dev --no-configuration-cache"

[tasks.boot-run]
description = "Run Spring Boot application"
run_windows = "gradlew.bat bootRun"
run = "gradle bootRun"

[tasks.jacoco]
description = "Generate test coverage report"
run_windows = "gradlew.bat jacocoTestReport -Djakarta.migration.mode=dev"
run = "gradle jacocoTestReport -Djakarta.migration.mode=dev"

# IntelliJ Plugin Development Tasks

[tasks.runIde]
description = "Run IntelliJ plugin in standard mode"
run_windows = "gradlew.bat :premium-intellij-plugin:runIde"
run = "gradle :premium-intellij-plugin:runIde"

[tasks.runIdeDev]
description = "Run IntelliJ plugin in development mode (skips licensing, enables dev tab)"
run_windows = "gradlew.bat :premium-intellij-plugin:runIdeDev"
run = "gradle :premium-intellij-plugin:runIdeDev"

[tasks.runIdeDemo]
description = "Run IntelliJ plugin in demo marketplace mode (uses JetBrains Demo Marketplace)"
run_windows = "gradlew.bat :premium-intellij-plugin:runIdeDemo"
run = "gradle :premium-intellij-plugin:runIdeDemo"
