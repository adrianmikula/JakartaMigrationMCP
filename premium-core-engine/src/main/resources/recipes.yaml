  - name: UpdatePersistenceXml
    description: Updates persistence.xml namespace to Jakarta
    pattern: "xmlns:persistence='http://java.sun.com/xml/ns/persistence' → xmlns:persistence='https://jakarta.ee/xml/ns/persistence'"
    safety: HIGH
    reversible: true
    fileFilter: "persistence.xml"
    category: CONFIGURATION
    replacements:
      - from: "http://java.sun.com/xml/ns/persistence"
        to: "https://jakarta.ee/xml/ns/persistence"

  - name: UpdateWebXml
    description: Updates web.xml namespace to Jakarta
    pattern: "http://java.sun.com/xml/ns/javaee → https://jakarta.ee/xml/ns/jakartaee"
    safety: MEDIUM
    reversible: true
    fileFilter: "web.xml"
    category: CONFIGURATION
    category: CONFIGURATION
    replacements:
      - from: "http://java.sun.com/xml/ns/javaee"
        to: "https://jakarta.ee/xml/ns/jakartaee"

  - name: MigrateJPA
