recipes:
  - name: AddJakartaNamespace
    description: Converts javax.* imports and references to jakarta.*
    pattern: "javax.* → jakarta.*"
    safety: HIGH
    reversible: true
    category: NAMESPACE_MIGRATION
    replacements:
      - from: "javax.servlet"
        to: "jakarta.servlet"
      - from: "javax.persistence"
        to: "jakarta.persistence"
      - from: "javax.validation"
        to: "jakarta.validation"
      - from: "javax.annotation"
        to: "jakarta.annotation"
      - from: "javax.inject"
        to: "jakarta.inject"
      - from: "javax.ejb"
        to: "jakarta.ejb"
      - from: "javax.transaction"
        to: "jakarta.transaction"
      - from: "javax.enterprise"
        to: "jakarta.enterprise"
      - from: "javax.ws.rs"
        to: "jakarta.ws.rs"
      - from: "javax.json"
        to: "jakarta.json"
      - from: "javax.xml.bind"
        to: "jakarta.xml.bind"
      - from: "javax.xml.ws"
        to: "jakarta.xml.ws"
  - name: JavaxValidationToJakartaValidation
    description: Converts javax.validation.* to jakarta.validation.*
    pattern: "javax.validation.* → jakarta.validation.*"
    safety: HIGH
    reversible: true
    replacements:
