recipes:
  - name: AddJakartaNamespace
    description: Converts javax.* imports and references to jakarta.*
    pattern: "javax.* → jakarta.*"
    safety: HIGH
    reversible: true
    replacements:
      - from: "javax.servlet"
        to: "jakarta.servlet"
      - from: "javax.persistence"
        to: "jakarta.persistence"
      - from: "javax.validation"
        to: "jakarta.validation"
      - from: "javax.annotation"
        to: "jakarta.annotation"
      - from: "javax.inject"
        to: "jakarta.inject"
      - from: "javax.ejb"
        to: "jakarta.ejb"
      - from: "javax.transaction"
        to: "jakarta.transaction"
      - from: "javax.enterprise"
        to: "jakarta.enterprise"
      - from: "javax.ws.rs"
        to: "jakarta.ws.rs"
      - from: "javax.json"
        to: "jakarta.json"
      - from: "javax.xml.bind"
        to: "jakarta.xml.bind"
      - from: "javax.xml.ws"
        to: "jakarta.xml.ws"

  - name: UpdatePersistenceXml
    description: Updates persistence.xml namespace to Jakarta
    pattern: "xmlns:persistence='http://java.sun.com/xml/ns/persistence' → xmlns:persistence='https://jakarta.ee/xml/ns/persistence'"
    safety: HIGH
    reversible: true
    fileFilter: "persistence.xml"
    replacements:
      - from: "http://java.sun.com/xml/ns/persistence"
        to: "https://jakarta.ee/xml/ns/persistence"

  - name: UpdateWebXml
    description: Updates web.xml namespace to Jakarta
    pattern: "http://java.sun.com/xml/ns/javaee → https://jakarta.ee/xml/ns/jakartaee"
    safety: MEDIUM
    reversible: true
    fileFilter: "web.xml"
    replacements:
      - from: "http://java.sun.com/xml/ns/javaee"
        to: "https://jakarta.ee/xml/ns/jakartaee"

  - name: MigrateJPA
    description: Converts javax.persistence.* to jakarta.persistence.*
    pattern: "javax.persistence.* → jakarta.persistence.*"
    safety: HIGH
    reversible: true
    replacements:
      - from: "javax.persistence"
        to: "jakarta.persistence"

  - name: MigrateBeanValidation
    description: Converts javax.validation.* to jakarta.validation.*
    pattern: "javax.validation.* → jakarta.validation.*"
    safety: HIGH
    reversible: true
    replacements:
      - from: "javax.validation"
        to: "jakarta.validation"
      - from: "javax.validation.constraints"
        to: "jakarta.validation.constraints"

  - name: MigrateServlet
    description: Converts javax.servlet.* to jakarta.servlet.*
    pattern: "javax.servlet.* → jakarta.servlet.*"
    safety: HIGH
    reversible: true
    replacements:
      - from: "javax.servlet"
        to: "jakarta.servlet"

  - name: MigrateCDI
    description: Converts javax.enterprise.* and javax.inject.* to jakarta equivalents
    pattern: "javax.enterprise.* → jakarta.enterprise.*"
    safety: HIGH
    reversible: true
    replacements:
      - from: "javax.enterprise"
        to: "jakarta.enterprise"
      - from: "javax.inject"
        to: "jakarta.inject"

  - name: MigrateREST
