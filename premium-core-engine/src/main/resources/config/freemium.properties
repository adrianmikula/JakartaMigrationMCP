# Freemium Configuration
# This file controls the credit limits and truncation settings for free users.
# Premium users have unlimited access and are not affected by these settings.

# =============================================================================
# CREDIT SETTINGS
# =============================================================================

# The number of action credits available to free users.
# Each premium operation (scans, advanced scans, PDF reports, refactoring) consumes 1 credit.
# Default: 10
freemium.credits.actions.limit=10

# =============================================================================
# TRUNCATION SETTINGS
# =============================================================================

# Enable or disable truncation mode for free users with exhausted credits.
# When enabled, free users see truncated results instead of full results.
# Default: true
freemium.truncation.enabled=true

# Dashboard tab truncation limit
# Free users with exhausted credits see only the first N items.
# Default: 10
freemium.truncation.dashboard.limit=5

# Dependencies tab truncation limit
# Free users with exhausted credits see only the first N dependencies.
# Default: 10
freemium.truncation.dependencies.limit=5

# Advanced Scans tab truncation limit (per sub-tab)
# Free users with exhausted credits see only the first N results per sub-tab.
# This applies to each scan type: JPA, Bean Validation, Servlet/JSP, Build Config,
# Config Files, Deprecated API, CDI Injection, REST/SOAP, Security API, JMS Messaging,
# Classloader, Logging/Metrics, Serialization/Cache, Third-Party Libraries.
# Default: 10
freemium.truncation.advanced_scan.limit=5

# =============================================================================
# FREE FEATURES (No Limits)
# =============================================================================
# The following features are always available to all users without restrictions:
# - Migration Strategy tab
# - Dependency Graph tab
# - Platforms tab
# - Support tab
# - AI tab

# =============================================================================
# SUPABASE ANALYTICS CONFIGURATION
# =============================================================================
# Supabase project URL for analytics and error reporting
supabase.url=https://your-project.supabase.co

# Supabase anonymous/public key for client access
supabase.anon.key=your-supabase-anon-key

# Enable/disable analytics collection
supabase.analytics.enabled=true

# Enable/disable error reporting
supabase.error.reporting.enabled=true

# Batch size for analytics events (to reduce API calls)
supabase.analytics.batch.size=10

# Flush interval in seconds for analytics batches
supabase.analytics.flush.interval.seconds=30
