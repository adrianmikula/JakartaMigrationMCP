# Platform Detection Configuration for Jakarta Migration
# This file defines supported application servers, frameworks, and Java versions
# Simplified design: only essential patterns + common artifacts for fast detection

platforms:
  # Java Version Detection
  java:
    name: "Java"
    description: "Java Development Kit version"
    patterns:
      - file: "gradle.properties"
        regex: "org\\.gradle\\.java\\.home=.*jdk-([0-9]+)"
        versionGroup: 1
      - file: "build.gradle"
        regex: "sourceCompatibility\\s*=\\s*['\"]([0-9]+)"
        versionGroup: 1
      - file: "build.gradle.kts"
        regex: "sourceCompatibility\\s*=\\s*['\"]([0-9]+)"
        versionGroup: 1
      - file: "pom.xml"
        regex: "<maven\\.compiler\\.source>([0-9]+)</maven\\.compiler\\.source>"
        versionGroup: 1
      - file: ".java-version"
        regex: "([0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "11"
      supportedVersions:
        - "11"
        - "17"
        - "21"
        - "22"

  # Spring Framework Detection
  spring:
    name: "Spring Framework"
    description: "Spring Framework version"
    patterns:
      - file: "build.gradle"
        regex: "org\\.springframework\\.boot:spring-boot-starter-parent:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "build.gradle.kts"
        regex: "org\\.springframework\\.boot:spring-boot-starter-parent:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "pom.xml"
        regex: "<spring-boot\\.version>([0-9]+\\.[0-9]+\\.[0-9]+)</spring-boot\\.version>"
        versionGroup: 1
      - file: "gradle.properties"
        regex: "springVersion\\s*=\\s*['\"]([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "6.0"
      supportedVersions:
        - "6.0"
        - "6.1"
        - "6.2"
        - "7.0"
        - "7.1"
        - "7.2"
    javaxVersions:
      - "5.3"
      - "5.4"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "self"
    commonArtifacts:
      - "spring-boot-starter"
      - "spring-boot-starter-web"
      - "spring-boot-starter-data-jpa"
      - "spring-boot-starter-actuator"
      - "spring-boot-starter-security"
      - "spring-boot-starter-test"
      - "spring-boot-starter-validation"
      - "org.springframework.boot"
      - "org.springframework.web"
      - "org.springframework.data"
      - "org.springframework.security"

  # Apache Tomcat
  tomcat:
    name: "Apache Tomcat"
    description: "Apache Tomcat application server"
    patterns:
      - file: "catalina.bat"
        regex: "Apache Tomcat/([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "catalina.jar"
        regex: "catalina-([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "server.xml"
        regex: "<Connector[^>]*port=\"([0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "tomcat-embed-core"
      - "tomcat-embed-jasper"
      - "tomcat-catalina"
      - "tomcat-coyote"
      - "tomcat-juli"
      - "tomcat-util"
      - "tomcat-util-scan"
      - "org.apache.tomcat.embed"
      - "org.apache.tomcat.jasper"
      - "org.apache.tomcat.catalina"
      - "org.apache.tomcat.util"
    jakartaCompatibility:
      minVersion: "10.0"
      supportedVersions:
        - "10.0"
        - "10.1"
        - "11.0"
        - "11.1"
    javaxVersions:
      - "8.5"
      - "9.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "self"

  # Red Hat JBoss/WildFly
  wildfly:
    name: "WildFly"
    description: "Red Hat WildFly application server"
    patterns:
      - file: "bin/standalone.sh"
        regex: "WildFly Full Platform ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "modules/system/layers/base/org/jboss/as/server/main/module.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "wildfly-ee"
      - "wildfly-core"
      - "wildfly-undertow"
      - "wildfly-client"
      - "wildfly-logging"
      - "wildfly-naming"
      - "wildfly-security"
      - "wildfly-transactions"
      - "org.wildfly.core"
      - "org.wildfly.undertow"
      - "org.wildfly.client"
      - "org.wildfly.extension"
      - "org.wildfly.security"
      - "org.wildfly"
      - "wildfly-arquillian-container-managed"
      - "wildfly-arquillian-container-remote"
      - "wildfly-dist"
      - "org.jboss.as"
      - "jboss-as"
    jakartaCompatibility:
      minVersion: "27.0"
      supportedVersions:
        - "27.0"
        - "27.1"
        - "28.0"
        - "29.0"
    javaxVersions:
      - "20.0"
      - "21.0"
      - "23.0"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "5+"

  # Eclipse Jetty
  jetty:
    name: "Eclipse Jetty"
    description: "Eclipse Jetty application server"
    patterns:
      - file: "start.ini"
        regex: "jetty-([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "jetty-server"
        regex: "jetty-server-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    commonArtifacts:
      - "jetty-server"
      - "jetty-servlet"
      - "jetty-servlets"
      - "jetty-webapp"
      - "jetty-annotations"
      - "jetty-client"
      - "jetty-continuation"
      - "jetty-http"
      - "jetty-io"
      - "jetty-jmx"
      - "jetty-jndi"
      - "jetty-plus"
      - "jetty-security"
      - "jetty-util"
      - "org.eclipse.jetty"
      - "org.eclipse.jetty.server"
      - "org.eclipse.jetty.servlet"
      - "org.eclipse.jetty.client"
      - "org.eclipse.jetty.websocket"
    jakartaCompatibility:
      minVersion: "12.0"
      supportedVersions:
        - "12.0"
        - "11.0"
        - "10.0"
    javaxVersions:
      - "9.4"
      - "10.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # IBM WebSphere Liberty
  liberty:
    name: "WebSphere Liberty"
    description: "IBM WebSphere Liberty application server"
    patterns:
