# Platform Detection Configuration for Jakarta Migration
# This file defines supported application servers, frameworks, and Java versions
# Simplified design: only essential patterns + common artifacts for fast detection

platforms:
  # Java Version Detection
  java:
    name: "Java"
    description: "Java Development Kit version"
    patterns:
      - file: "gradle.properties"
        regex: "org\\.gradle\\.java\\.home=.*jdk-([0-9]+)"
        versionGroup: 1
      - file: "build.gradle"
        regex: "sourceCompatibility\\s*=\\s*['\"]([0-9]+)"
        versionGroup: 1
      - file: "build.gradle.kts"
        regex: "sourceCompatibility\\s*=\\s*['\"]([0-9]+)"
        versionGroup: 1
      - file: "pom.xml"
        regex: "<maven\\.compiler\\.source>([0-9]+)</maven\\.compiler\\.source>"
        versionGroup: 1
      - file: ".java-version"
        regex: "([0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "11"
      supportedVersions:
        - "11"
        - "17"
        - "21"
        - "22"

  # Spring Framework Detection
  spring:
    name: "Spring Framework"
    description: "Spring Framework version"
    patterns:
      - file: "build.gradle"
        regex: "org\\.springframework\\.boot:spring-boot-starter-parent:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "build.gradle.kts"
        regex: "org\\.springframework\\.boot:spring-boot-starter-parent:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "pom.xml"
        regex: "<spring-boot\\.version>([0-9]+\\.[0-9]+\\.[0-9]+)</spring-boot\\.version>"
        versionGroup: 1
      - file: "gradle.properties"
        regex: "springVersion\\s*=\\s*['\"]([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "6.0"
      supportedVersions:
        - "6.0"
        - "6.1"
        - "6.2"
        - "7.0"
        - "7.1"
        - "7.2"
    javaxVersions:
      - "5.3"
      - "5.4"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "self"
    commonArtifacts:
      - "spring-boot-starter"
      - "spring-boot-starter-web"
      - "spring-boot-starter-data-jpa"
      - "spring-boot-starter-actuator"
      - "spring-boot-starter-security"
      - "spring-boot-starter-test"
      - "spring-boot-starter-validation"
      - "org.springframework.boot"
      - "org.springframework.web"
      - "org.springframework.data"
      - "org.springframework.security"

  # Apache Tomcat
  tomcat:
    name: "Apache Tomcat"
    description: "Apache Tomcat application server"
    patterns:
      - file: "catalina.bat"
        regex: "Apache Tomcat/([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "catalina.jar"
        regex: "catalina-([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "server.xml"
        regex: "<Connector[^>]*port=\"([0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "org.apache.tomcat.embed:tomcat-embed-core"
      - "org.apache.tomcat.embed:tomcat-embed-jasper"
      - "org.apache.tomcat:tomcat-catalina"
      - "org.apache.tomcat:tomcat-coyote"
      - "org.apache.tomcat:tomcat-juli"
      - "org.apache.tomcat:tomcat-util"
      - "org.apache.tomcat:tomcat-util-scan"
      - "org.apache.tomcat:tomcat-servlet-api"
    jakartaCompatibility:
      minVersion: "10.0"
      supportedVersions:
        - "10.0"
        - "10.1"
        - "11.0"
        - "11.1"
    javaxVersions:
      - "8.5"
      - "9.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "self"

  # Red Hat JBoss/WildFly
  wildfly:
    name: "WildFly"
    description: "Red Hat WildFly application server"
    patterns:
      - file: "bin/standalone.sh"
        regex: "WildFly Full Platform ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "modules/system/layers/base/org/jboss/as/server/main/module.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "org.wildfly:wildfly-ee"
      - "org.wildfly.core:wildfly-core"
      - "org.wildfly:wildfly-undertow"
      - "org.wildfly:wildfly-client"
      - "org.wildfly:wildfly-logging"
      - "org.wildfly:wildfly-naming"
      - "org.wildfly:wildfly-security"
      - "org.wildfly:wildfly-transactions"
      - "org.wildfly.arquillian:wildfly-arquillian-container-managed"
      - "org.wildfly.arquillian:wildfly-arquillian-container-remote"
      - "org.wildfly:wildfly-dist"
      - "org.jboss.as:jboss-as"
    jakartaCompatibility:
      minVersion: "27.0"
      supportedVersions:
        - "27.0"
        - "27.1"
        - "28.0"
        - "29.0"
    javaxVersions:
      - "20.0"
      - "21.0"
      - "23.0"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "5+"

  # Eclipse Jetty
  jetty:
    name: "Eclipse Jetty"
    description: "Eclipse Jetty application server"
    patterns:
      - file: "start.ini"
        regex: "jetty-([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "jetty-server"
        regex: "jetty-server-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    commonArtifacts:
      - "org.eclipse.jetty:jetty-server"
      - "org.eclipse.jetty:jetty-servlet"
      - "org.eclipse.jetty:jetty-servlets"
      - "org.eclipse.jetty:jetty-webapp"
      - "org.eclipse.jetty:jetty-annotations"
      - "org.eclipse.jetty:jetty-client"
      - "org.eclipse.jetty:jetty-continuation"
      - "org.eclipse.jetty:jetty-http"
      - "org.eclipse.jetty:jetty-io"
      - "org.eclipse.jetty:jetty-jmx"
      - "org.eclipse.jetty:jetty-jndi"
      - "org.eclipse.jetty:jetty-plus"
      - "org.eclipse.jetty:jetty-security"
      - "org.eclipse.jetty:jetty-util"
      - "org.eclipse.jetty.websocket:websocket-jetty-server"
      - "org.eclipse.jetty.websocket:websocket-jetty-client"
    jakartaCompatibility:
      minVersion: "12.0"
      supportedVersions:
        - "12.0"
        - "11.0"
        - "10.0"
    javaxVersions:
      - "9.4"
      - "10.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # IBM WebSphere Liberty
  liberty:
    name: "WebSphere Liberty"
    description: "IBM WebSphere Liberty application server"
    patterns:
      - file: "lib/com.ibm.websphere.appserver.api.jar"
        regex: "version=([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "etc/server.env"
        regex: "WLP_USER_DIR=([^\n]+)"
        versionGroup: 1
    commonArtifacts:
      - "com.ibm.websphere.appserver:liberty"
      - "io.openliberty:openliberty-kernel"
      - "io.openliberty:openliberty-webProfile"
      - "io.openliberty:openliberty-jakartaee"
    jakartaCompatibility:
      minVersion: "23.0"
      supportedVersions:
        - "23.0"
        - "24.0"
    javaxVersions:
      - "8.0"
      - "9.0"
      - "9.1"
    requirements:
      java: "17+"
      spring: "5.3+"

  # IBM WebSphere Traditional
  websphere:
    name: "WebSphere Traditional"
    description: "IBM WebSphere Application Server (Traditional)"
    patterns:
      - file: "was_home"
        regex: "WebSphere ([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "profileRegistry.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "com.ibm.websphere:websphere"
      - "com.ibm.ws:ws-javaee"
      - "com.ibm.websphere.appserver:websphere-api"
      - "net.wasdev.maven.tools.targets:websphere-embedded-api"
    jakartaCompatibility:
      minVersion: "9.0"
      supportedVersions:
        - "9.0"
    javaxVersions:
      - "6.0"
      - "7.0"
      - "8.0"
    requirements:
      java: "8+"
      spring: "4.3+"

  # Apache TomEE
  tomee:
    name: "Apache TomEE"
    description: "Apache TomEE application server"
    patterns:
      - file: "bin/tomee.sh"
        regex: "Apache TomEE ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "lib/tomee-catalina-([0-9]+)\\.[0-9]+\\.[0-9]+)\\.jar"
        regex: "tomee-catalina-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    commonArtifacts:
      - "org.apache.tomee:tomee-embedded"
      - "org.apache.tomee:tomee-webapp"
      - "org.apache.tomee:tomee-ee"
      - "org.apache.tomee:tomee-microprofile"
    jakartaCompatibility:
      minVersion: "9.0"
      supportedVersions:
        - "9.0"
        - "9.1"
        - "10.0"
    javaxVersions:
      - "7.0"
      - "8.0"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "5+"

  # GlassFish Server
  glassfish:
    name: "GlassFish Server"
    description: "Oracle GlassFish application server"
    patterns:
      - file: "bin/asadmin"
        regex: "GlassFish Server Open Source Edition ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "lib/glassfish-([0-9]+)\\.[0-9]+\\.[0-9]+)\\.jar"
        regex: "glassfish-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    commonArtifacts:
      - "org.glassfish.main:glassfish-main"
      - "org.glassfish.main:glassfish-embedded"
      - "org.glassfish.web:glassfish-web"
    jakartaCompatibility:
      minVersion: "7.0"
      supportedVersions:
        - "7.0"
        - "7.1"
        - "8.0"
    javaxVersions:
      - "5.0"
      - "6.0"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "5+"

  # NetBeans IDE Detection
  netbeans:
    name: "NetBeans IDE"
    description: "Apache NetBeans IDE version and platform"
    patterns:
      - file: "netbeans.conf"
        regex: "netbeans_jdkhome=\"([^\"]+)\""
        versionGroup: 1
      - file: "etc/netbeans.clusters"
        regex: "netbeans_id=\"([^\"]+)\""
        versionGroup: 1
      - file: "netbeans-platform.jar"
        regex: "netbeans-platform-([0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "cluster.json"
        regex: "version\":\"([0-9]+\\.[0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "org.netbeans.modules:org-netbeans-modules-java-platform"
      - "org.netbeans.api:org-netbeans-api-java"
      - "org.netbeans.api:org-netbeans-api-progress"
      - "org.netbeans.modules:org-netbeans-modules-projectapi"
      - "org.netbeans.api:org-netbeans-api-lsp"
      - "org.openide.util:org-openide-util"
    jakartaCompatibility:
      minVersion: "12.0"
      supportedVersions:
        - "12.0"
        - "12.1"
        - "12.2"
        - "12.3"
        - "12.4"
        - "12.5"
        - "12.6"
        - "22.0"
        - "21.0"
        - "20.0"
    javaxVersions:
      - "11.0"
      - "12.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "self"

  # Spring Boot Detection
  springboot:
    name: "Spring Boot"
    description: "Spring Boot framework version"
    patterns:
      - file: "build.gradle"
        regex: "org\\.springframework\\.boot:spring-boot-dependencies:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "build.gradle.kts"
        regex: "org\\.springframework\\.boot:spring-boot-dependencies:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "pom.xml"
        regex: "<spring-boot\\.version>([0-9]+\\.[0-9]+\\.[0-9]+)</spring-boot\\.version>"
        versionGroup: 1
    commonArtifacts:
      - "org.springframework.boot:spring-boot-starter-parent"
      - "org.springframework.boot:spring-boot-dependencies"
      - "org.springframework.boot:spring-boot-devtools"
      - "org.springframework.boot:spring-boot-actuator"
      - "org.springframework.boot:spring-boot-autoconfigure"
      - "org.springframework.boot:spring-boot-starter-web"
      - "org.springframework.boot:spring-boot-starter-data-jpa"
      - "org.springframework.boot:spring-boot-starter-security"
      - "org.springframework.boot:spring-boot-starter-test"
    jakartaCompatibility:
      minVersion: "3.0"
      supportedVersions:
        - "3.0"
        - "3.1"
        - "3.2"
        - "3.3"
        - "3.4"
        - "3.5"
    javaxVersions:
      - "2.7"
      - "2.8"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "self"

  # Payara Server
  payara:
    name: "Payara Server"
    description: "Payara application server"
    patterns:
      - file: "bin/asadmin"
        regex: "Payara Server ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "lib/payara-([0-9]+)\\.[0-9]+\\.[0-9]+)\\.jar"
        regex: "payara-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    commonArtifacts:
      - "fish.payara.extras:payara-embedded"
      - "fish.payara.extras:payara-micro"
      - "fish.payara.api:payara-api"
      - "fish.payara.nucleus:payara-nucleus"
    jakartaCompatibility:
      minVersion: "7.0"
      supportedVersions:
        - "7.0"
        - "7.1"
        - "8.0"
    javaxVersions:
      - "5.0"
      - "6.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # JBoss EAP
  jbosseap:
    name: "JBoss EAP"
    description: "Red Hat JBoss EAP application server"
    patterns:
      - file: "bin/standalone.sh"
        regex: "JBoss EAP ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "modules/system/layers/base/org/jboss/as/product/module.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "org.jboss.eap:jboss-eap-dist"
      - "org.jboss.eap:jboss-eap-embedded"
    jakartaCompatibility:
      minVersion: "8.0"
      supportedVersions:
        - "8.0"
        - "8.1"
        - "8.2"
    javaxVersions:
      - "7.4"
      - "7.5"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "6+"

  # GlassFish Server
  glassfish:
    name: "GlassFish Server"
    description: "Eclipse GlassFish application server"
    patterns:
      - file: "glassfish-rt.jar"
        regex: "glassfish-([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "domain.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "org.glassfish.main:glassfish"
      - "org.glassfish:javax.faces"
      - "org.glassfish:javax.json"
    jakartaCompatibility:
      minVersion: "7.0"
      supportedVersions:
        - "7.0"
        - "6.2"
        - "6.1"
        - "6.0"
    javaxVersions:
      - "4.1"
      - "4.0"
      - "3.1"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # Spring Boot (as application server)
  springboot:
    name: "Spring Boot"
    description: "Spring Boot embedded server"
    patterns:
      - file: "spring-boot.jar"
        regex: "Spring Boot ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "application.properties"
        regex: "spring.boot.version=([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    commonArtifacts:
      - "org.springframework.boot:spring-boot-starter"
      - "org.springframework.boot:spring-boot-starter-web"
      - "org.springframework.boot:spring-boot-starter-data-jpa"
      - "org.springframework.boot:spring-boot-starter-actuator"
      - "org.springframework.boot:spring-boot-starter-security"
      - "org.springframework.boot:spring-boot-starter-test"
      - "org.springframework.boot:spring-boot-starter-validation"
      - "org.springframework.boot:spring-boot-autoconfigure"
      - "org.springframework.boot:spring-boot-loader"
      - "org.springframework.boot:spring-boot"
    jakartaCompatibility:
      minVersion: "3.0"
      supportedVersions:
        - "3.0"
        - "3.1"
        - "3.2"
        - "3.3"
    javaxVersions:
      - "2.7"
      - "2.6"
      - "2.5"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "self"

# Risk scoring for platform changes and deployment artifacts
riskScoring:
  # Platform-specific base risks
  platformBaseRisks:
    websphere: 25
    liberty: 25
    wildfly: 20
    jboss: 20
    tomcat: 15
    jetty: 18
    default: 12
  
  # Deployment artifact risk weights
  deploymentArtifacts:
    ear: 4        # EAR projects are most complex
    war: 2        # WAR projects are moderate complexity
    jar: 1        # JAR projects are low complexity
  
  # Legacy risk scoring (for backward compatibility)
  javaVersionChange: 10
