      - "fish.payara.core"
      - "fish.payara.enterprise"
      - "fish.payara.extras"
      - "fish.payara.nucleus"
      - "fish.payara.security"
      - "org.glassfish.main"
      - "org.glassfish.web"
      - "org.glassfish.jersey"
      - "org.glassfish.jaxb"
      - "org.glassfish.jersey.core"
      - "org.glassfish.jersey.media"
      - "org.glassfish.jersey.server"
