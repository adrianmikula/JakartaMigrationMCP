        regex: "WebSphere ([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "profileRegistry.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    commonArtifacts:
      - "com.ibm.websphere"
      - "com.ibm.ws"
      - "com.ibm.websphere.appserver"
      - "websphere-api"
      - "websphere-embedded-api"
