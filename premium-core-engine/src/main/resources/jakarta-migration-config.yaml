# Jakarta Migration Plugin Configuration
# This file contains version numbers and configuration values that should not be hardcoded in source code

# Server and Plugin Configuration
server:
  name: "jakarta-migration-mcp"
  display_name: "Jakarta Migration MCP"
  version: "1.0.0"
  description: "MCP server for Jakarta EE migration analysis and automation"
  vendor: "Jakarta Migration Team"
  url: "https://jakarta-migration.com"

# Database Configuration
database:
  central:
    file: "central-migration-analysis.db"
    version: 5
  project:
    file: "jakarta-migration.db"
    version: 2

# Dependency Migration Mappings
dependency_mappings:
  # Servlet API
  "javax.servlet:javax.servlet-api":
    jakarta: "jakarta.servlet:jakarta.servlet-api"
    version: "4.0.4"
  "javax.servlet:servlet-api":
    jakarta: "jakarta.servlet:jakarta.servlet-api"
    version: "4.0.4"

  # JPA
  "javax.persistence:javax.persistence-api":
    jakarta: "jakarta.persistence:jakarta.persistence-api"
    version: "2.2.3"
  "org.hibernate:hibernate-core":
    jakarta: "org.hibernate:hibernate-core"
    version: "5.6.15.Final"
    notes: "Need migration to 6.x for full Jakarta support"

  # Bean Validation
  "javax.validation:validation-api":
    jakarta: "jakarta.validation:jakarta.validation-api"
    version: "2.0.2"
  "javax.validation:validation-api:1.1.0.Final":
    jakarta: "jakarta.validation:jakarta.validation-api"
    version: "2.0.2"

  # CDI
  "javax.inject:javax.inject":
    jakarta: "jakarta.inject:jakarta.inject-api"
    version: "1.0.5"
  "javax.enterprise:cdi-api":
    jakarta: "jakarta.enterprise:jakarta.cdi-api"
    version: "2.0.2"

  # JAXB
  "javax.xml.bind:jaxb-api":
    jakarta: "jakarta.xml.bind:jakarta-xml-bind-api"
    version: "2.3.3"

  # JAX-RS
  "javax.ws.rs:javax.ws.rs-api":
    jakarta: "jakarta.ws.rs:jakarta.ws.rs-api"
    version: "2.1.6"

  # JMS
  "javax.jms:javax.jms-api":
    jakarta: "jakarta.jms:jakarta.jms-api"
    version: "2.0.3"

  # Mail
  "javax.mail:mail":
    jakarta: "com.sun.mail:jakarta.mail"
    version: "1.6.7"

  # JSON
  "javax.json:javax.json-api":
    jakarta: "jakarta.json:jakarta.json-api"
    version: "1.1.6"

  # JSONP
  "javax.json.bind:jsonb-api":
    jakarta: "jakarta.json.bind:jakarta.jsonb-api"
    version: "1.0.2"

  # Annotations
  "javax.annotation:javax.annotation-api":
    jakarta: "jakarta.annotation:jakarta.annotation-api"
    version: "1.3.5"

# Third-party Library Information
third_party_libraries:
  "org.hibernate:hibernate-core":
    name: "Hibernate ORM"
    jakarta_alternative: "org.hibernate.orm:hibernate-core"
    migration_status: "partial-migration"
    notes: "Spring 6.x (Jakarta) - partial migration support"
  
  "org.hibernate.validator:hibernate-validator":
    name: "Hibernate Validator"
    jakarta_alternative: "Use Jakarta version"
    migration_status: "partial-migration"
  
  "org.springframework:spring-core":
    name: "Spring Framework"
    jakarta_alternative: "Spring 6.x (Jakarta)"
    migration_status: "partial-migration"

# Transitive Dependency Mappings
transitive_dependencies:
  "javax.xml.bind:jaxb-api":
    jakarta: "jakarta.xml.bind:jakarta-xml-bind-api"
    risk_level: "high"
    recommendation: "Replace with Jakarta XML Binding"
  
  "org.glassfish.jaxb:jaxb-runtime":
    jakarta: "org.glassfish.jaxb:jaxb-runtime"
    risk_level: "high"
    recommendation: "Use Jakarta XML Binding"
  
  "javax.activation:activation":
    jakarta: "jakarta.activation:jakarta.activation-api"
    risk_level: "medium"
    recommendation: "Replace with Jakarta Activation"
  
  "com.sun.xml.bind:jaxb-impl":
    jakarta: "org.glassfish.jaxb:jaxb-runtime"
    risk_level: "high"
    recommendation: "Use Jakarta JAXB Runtime"
  
  "com.sun.xml.bind:jaxb-core":
    jakarta: "org.glassfish.jaxb:jaxb-runtime"
    risk_level: "high"
    recommendation: "Use Jakarta JAXB Runtime"

# Support URLs
support:
  github: "https://github.com/sponsors/adrianmikula"
  linkedin: "https://linkedin.com/in/adrianmikula"
  plugin_page: "https://plugins.jetbrains.com/plugin/30093-jakarta-migration-javax--jakarta-"
  plugin_updates: "https://plugins.jetbrains.com/plugin/30093-jakarta-migration-javax--jakarta-/versions"
  marketplace: "https://plugins.jetbrains.com/plugin/30093-jakarta-migration-javax--jakarta-"
  documentation: "https://jakarta-migration.com/docs"
  issues: "https://github.com/adrianmikula/jakarta-migration/issues"
  discussions: "https://github.com/adrianmikula/jakarta-migration/discussions"

# Default Test Data (for unit tests)
test_data:
  dependencies:
    - group_id: "org.hibernate"
      artifact_id: "hibernate-core"
      version: "5.6.0.Final"
      jakarta_group_id: "org.hibernate"
      jakarta_artifact_id: "hibernate-core"
      jakarta_version: "6.0.0.Alpha1"
      migration_status: "Compatible"
    - group_id: "javax.servlet"
      artifact_id: "javax.servlet-api"
      version: "4.0.1"
      jakarta_group_id: "jakarta.servlet"
      jakarta_artifact_id: "jakarta.servlet-api"
      jakarta_version: "5.0.0"
      migration_status: "Compatible"
