# SUPABASE TEST CONFIGURATION
# =============================================================================
# Test Supabase project URL - isolated from production
supabase.url=https://test-wmngdqhgybiomoxjfxpc.supabase.co

# Test Supabase anonymous key - limited permissions for testing
supabase.anon.key=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZS10ZXN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MzY4OTAsImV4cCI6MjA5MjUxMjg5MH0.test-key-for-testing-only

# Enable analytics for testing (can be overridden in specific tests)
