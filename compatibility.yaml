maven_artifacts:
  whitelist:
    - javax.management
    - javax.naming
    - javax.crypto

  mixed:
    - javax.xml
    - javax.transaction
    - javax.xml.bind
    - javax.xml.ws
    - javax.mail
    - javax.activation
    - javax.cache
    - javax.measure

  blacklist:
    - javax.servlet
    - javax.persistence
    - javax.validation
    - javax.ws.rs
    - javax.ejb
    - javax.jms
    - javax.faces
    - javax.enterprise

java_packages:
  whitelist:

  blacklist:
