# Notification messages for Jakarta Migration Plugin

# Usage permission notification
usage.permission.message=Help improve this plugin by sharing anonymous usage data and error reports?

# Scan completion notifications
scan.complete.with.dependencies=Analysis Complete: {0} dependencies found
scan.complete.no.issues=Analysis Complete: No migration issues detected
scan.complete.deep.premium=Analysis Complete: Deep dependency, advanced, and platform scans finished
scan.complete.deep.free=Analysis Complete: Showing all dependencies found. Free users see first 10 dependencies in Dependencies tab

# Scan error notifications
scan.failed=Analysis Failed: Analysis failed: {0}
scan.error=Scan Error: Error running scans: {0}

# Credit exhaustion notifications
credits.exhausted.basic=Credits Exhausted: You've used all your free action credits. Upgrade to Premium to continue scanning projects.
credits.exhausted.partial=Credits Exhausted: Showing {0} of {1} dependencies. Upgrade for unlimited scans.
credits.exhausted.advanced=Credits Exhausted: You've used all your action credits. Upgrade to Premium to continue running advanced scans.
credit.error=Credit Error: Failed to consume action credit. Please try again.

# Future notification templates (can be reused for other features)
new.feature.message.template=New feature available: {0}
upgrade.reminder.message=Upgrade to Premium to unlock advanced features and unlimited scans.
experimental.features.message=Try experimental features to get early access to cutting-edge capabilities.

