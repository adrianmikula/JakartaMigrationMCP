# AI Assistant Guidelines for Jakarta Migration
# This file contains comprehensive prompts and examples for AI assistants

# ============================================
# ANALYSIS PROMPTS
# ============================================
ai.prompts.analysis=\
🤖 AI ASSISTANT PROMPTS FOR JAKARTA MIGRATION\n\n\
Use these prompts with Claude, Cursor, or other AI assistants to perform Jakarta migration tasks:\n\n\
📋 ANALYSIS PROMPTS:\n\
• "Analyze my project for Jakarta migration readiness. Check for javax packages, dependencies, and potential blockers."\n\
• "Scan my Java project and identify all javax imports that need to be migrated to jakarta."\n\
• "Review my dependency tree and suggest Jakarta-compatible versions for all libraries."\n\
• "Check my project's compatibility with Jakarta EE 9/10 and provide migration recommendations."\n\n\
🔧 MIGRATION PROMPTS:\n\
• "Generate a migration plan for converting my javax.servlet to jakarta.servlet imports. Include all affected files."\n\
• "Create a step-by-step guide to migrate my javax.persistence to jakarta.persistence."\n\
• "Help me refactor my javax.validation imports to jakarta.validation with proper error handling."\n\
• "Update my Maven dependencies from javax to jakarta equivalents."\n\
• "Migrate my JAX-RS imports from javax.ws.rs to jakarta.ws.rs."\n\n\
📊 DEPENDENCY ANALYSIS:\n\
• "Analyze my project's dependency graph and identify Jakarta migration risks."\n\
• "Show me transitive dependencies that will be affected by Jakarta migration."\n\
• "Check which of my dependencies have Jakarta equivalents available."\n\
• "Generate a compatibility matrix for my current dependencies."\n\n\
🏗️ BUILD SYSTEM SUPPORT:\n\
• "Update my Gradle build file for Jakarta EE dependencies."\n\
• "Configure my Maven project for Jakarta EE 10 migration."\n\
• "Help me set up Jakarta EE 9/10 with my build system."\n\
• "Verify my build configuration works with Jakarta dependencies."\n\n\
🧪 TESTING & VALIDATION:\n\
• "Create test cases for my migrated Jakarta code."\n\
• "Help me verify that my Jakarta migration is working correctly."\n\
• "Set up integration tests for Jakarta EE compatibility."\n\
• "Check my application runtime after Jakarta migration."\n\n\
📝 REPORTING:\n\
• "Generate a migration report with before/after comparison."\n\
• "Create a summary of all changes made during migration."\n\
• "Document the migration process and outcomes."\n\
• "Generate a compatibility report for stakeholders."\n\n\
💡 TIPS:\n\
• Always specify your Java version and Jakarta EE target version\n\
• Provide context about your application server and framework\n\
• Include error messages if you encounter issues\n\
• Ask for step-by-step explanations when needed\n\
• Request dry-run analysis before applying changes\n\
• Verify changes in a test environment first

# ============================================
# QUICK START EXAMPLES
# ============================================
ai.examples.quick.start=\
🎯 QUICK START EXAMPLES:\n\n\
• "I have a Spring Boot project using javax.validation. Analyze it for Jakarta migration."\n\
• "My Maven project has javax.servlet dependencies. Help me migrate to Jakarta EE 10."\n\
• "Check my Gradle project for Jakarta EE 9 compatibility and suggest changes."\n\
• "Review my pom.xml and update all javax dependencies to jakarta equivalents."\n\n\
🔧 ADVANCED EXAMPLES:\n\n\
• "Create a comprehensive migration plan for my enterprise Java application. Include risk assessment and timeline."\n\
• "Analyze my dependency graph and identify potential conflicts during Jakarta migration."\n\
• "Generate refactoring recipes to convert javax.persistence to jakarta.persistence with proper error handling."\n\
• "Help me implement Jakarta CDI beans to replace javax.enterprise.cdi imports."\n\
• "Set up Jakarta EE 10 with WildFly and migrate my JAX-RS endpoints."\n\n\
📊 WORKFLOW EXAMPLES:\n\n\
• "Start by analyzing my project, then create migration plan, then implement changes step by step."\n\
• "First check dependency compatibility, then update build files, then migrate source code."\n\
• "Help me create a migration branch, implement changes, test, then merge to main."\n\
• "Generate before/after reports and document the entire migration process."\n\n\
🏗️ BUILD-SPECIFIC EXAMPLES:\n\n\
• "Update my Maven pom.xml to use Jakarta EE 10 dependencies and update javax imports."\n\
• "Modify my build.gradle.kts for Jakarta EE 9 and configure the Jakarta plugin."\n\
• "Help me choose the right Jakarta EE version based on my application server."\n\
• "Configure my Spring Boot application.properties for Jakarta EE migration."\n\
• "Set up Jakarta EE 10 with Tomcat and update my web.xml configuration."\n\n\
🧪 TESTING EXAMPLES:\n\n\
• "Create unit tests for my migrated Jakarta validation code."\n\
• "Help me write integration tests for Jakarta EE 10 compatibility."\n\
• "Set up test containers with Jakarta EE runtimes for validation."\n\
• "Generate performance tests before and after Jakarta migration."\n\
• "Verify my application works with Jakarta EE 10 in a test environment."\n\n\
📝 REPORTING EXAMPLES:\n\n\
• "Generate a migration report showing all javax to jakarta conversions."\n\
• "Create a compatibility matrix for my dependencies and Jakarta versions."\n\
• "Document the migration process with screenshots and step-by-step guide."\n\
• "Produce a stakeholder report with migration timeline and risks."\n\
• "Generate a before/after code comparison report for migration."\n\n\
💡 BEST PRACTICES:\n\n\
• Always backup your project before starting migration\n\
• Test in a development environment first\n\
• Use version control to track changes\n\
• Verify functionality after each major change\n\
• Update documentation as you migrate\n\
• Consider using automated tools for large-scale migrations\n\
• Test with your target application server version\n\
• Monitor performance after migration\n\
• Plan rollback strategy in case of issues

