# Platform Detection Configuration for Jakarta Migration
# This file defines supported application servers, frameworks, and Java versions

platforms:
  # Java Version Detection
  java:
    name: "Java"
    description: "Java Development Kit version"
    patterns:
      - file: "gradle.properties"
        regex: "org\\.gradle\\.java\\.home=.*jdk-([0-9]+)"
        versionGroup: 1
      - file: "build.gradle"
        regex: "sourceCompatibility\\s*=\\s*['\"]([0-9]+)"
        versionGroup: 1
      - file: "build.gradle.kts"
        regex: "sourceCompatibility\\s*=\\s*['\"]([0-9]+)"
        versionGroup: 1
      - file: "pom.xml"
        regex: "<maven\\.compiler\\.source>([0-9]+)</maven\\.compiler\\.source>"
        versionGroup: 1
      - file: ".java-version"
        regex: "([0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "11"
      supportedVersions:
        - "11"
        - "17"
        - "21"
        - "22"
    javaxVersions:
      - "8"
    requirements:
      java: "self"
      jakarta: "9+"
      spring: "any"

  # Spring Framework Detection
  spring:
    name: "Spring Framework"
    description: "Spring Framework version"
    patterns:
      - file: "build.gradle"
        regex: "org\\.springframework\\.boot:spring-boot-starter-parent:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "build.gradle.kts"
        regex: "org\\.springframework\\.boot:spring-boot-starter-parent:([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "pom.xml"
        regex: "<spring-boot\\.version>([0-9]+\\.[0-9]+\\.[0-9]+)</spring-boot\\.version>"
        versionGroup: 1
      - file: "gradle.properties"
        regex: "springVersion\\s*=\\s*['\"]([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "6.0"
      supportedVersions:
        - "6.0"
        - "6.1"
        - "6.2"
        - "7.0"
        - "7.1"
        - "7.2"
    javaxVersions:
      - "5.3"
      - "5.4"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "self"

  # Apache Tomcat
  tomcat:
    name: "Apache Tomcat"
    description: "Apache Tomcat application server"
    patterns:
      - file: "bin/catalina.bat"
        regex: "Apache Tomcat/([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "lib/catalina.jar"
        regex: "catalina-([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "conf/server.xml"
        regex: "<Connector[^>]*port=\"([0-9]+)\""
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "10.0"
      supportedVersions:
        - "10.0"
        - "10.1"
        - "11.0"
        - "11.1"
    javaxVersions:
      - "8.5"
      - "9.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # Red Hat JBoss/WildFly
  wildfly:
    name: "WildFly"
    description: "Red Hat WildFly application server"
    patterns:
      - file: "bin/standalone.sh"
        regex: "WildFly Full Platform ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "modules/system/layers/base/org/jboss/as/server/main/module.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "27.0"
      supportedVersions:
        - "27.0"
        - "27.1"
        - "28.0"
        - "29.0"
    javaxVersions:
      - "20.0"
      - "21.0"
      - "23.0"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "6+"

  # Eclipse Jetty
  jetty:
    name: "Eclipse Jetty"
    description: "Eclipse Jetty application server"
    patterns:
      - file: "start.ini"
        regex: "jetty-([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "lib/jetty-server-([0-9]+)\\.[0-9]+\\.[0-9]+).jar"
        regex: "jetty-server-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "12.0"
      supportedVersions:
        - "12.0"
        - "11.0"
        - "10.0"
    javaxVersions:
      - "9.4"
      - "10.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # IBM WebSphere Liberty
  liberty:
    name: "WebSphere Liberty"
    description: "IBM WebSphere Liberty application server"
    patterns:
      - file: "lib/com.ibm.websphere.appserver.api.jar"
        regex: "version=([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "etc/server.env"
        regex: "LIBERTY_VERSION=([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "23.0"
      supportedVersions:
        - "23.0"
        - "23.1"
        - "24.0"
    javaxVersions:
      - "18.0"
      - "19.0"
      - "20.0"
      - "21.0"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "6+"

  # Apache TomEE
  tomee:
    name: "Apache TomEE"
    description: "Apache TomEE application server"
    patterns:
      - file: "bin/tomee.sh"
        regex: "Apache TomEE ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "lib/tomee-catalina-([0-9]+)\\.[0-9]+\\.[0-9]+).jar"
        regex: "tomee-catalina-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "9.0"
      supportedVersions:
        - "9.0"
        - "9.1"
        - "10.0"
    javaxVersions:
      - "7.0"
      - "8.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # Payara Server
  payara:
    name: "Payara Server"
    description: "Payara application server"
    patterns:
      - file: "bin/asadmin"
        regex: "Payara Server ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "lib/payara-([0-9]+)\\.[0-9]+\\.[0-9]+).jar"
        regex: "payara-([0-9]+)\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "7.0"
      supportedVersions:
        - "7.0"
        - "7.1"
        - "8.0"
    javaxVersions:
      - "5.0"
      - "6.0"
    requirements:
      java: "11+"
      jakarta: "9+"
      spring: "5+"

  # JBoss EAP
  jbosseap:
    name: "JBoss EAP"
    description: "Red Hat JBoss EAP application server"
    patterns:
      - file: "bin/standalone.sh"
        regex: "JBoss EAP ([0-9]+\\.[0-9]+\\.[0-9]+)"
        versionGroup: 1
      - file: "modules/system/layers/base/org/jboss/as/product/module.xml"
        regex: "version=\"([0-9]+\\.[0-9]+\\.[0-9]+)\""
        versionGroup: 1
    jakartaCompatibility:
      minVersion: "8.0"
      supportedVersions:
        - "8.0"
        - "8.1"
        - "8.2"
    javaxVersions:
      - "7.4"
      - "7.5"
    requirements:
      java: "17+"
      jakarta: "9+"
      spring: "6+"

# Risk scoring for platform changes
riskScoring:
  majorVersionChange: 10
  frameworkChange: 6
  runtimeChange: 5
  javaVersionChange: 8
