# Example Projects for Advanced Integration Testing
# This file contains URLs to real-world projects for testing refactor recipes, 
# advanced scans, and platform scans

# =============================================================================
# APPLICATION SERVER EXAMPLES
# =============================================================================
application_servers:
  - name: "Apache Tomcat"
    description: "Apache Tomcat with javax packages for migration testing"
    url: "https://github.com/EAG-es/restful_crud_v8"
    type: "application_server"
    features:
      - servlet
      - jsp
      - websocket
      - el
      
  - name: "WildFly"
    description: "WildFly with javax packages for migration testing"
    url: "https://github.com/wildfly/wildfly-client-interoperability"
    type: "application_server"
    features:
      - ejb
      - jpa
      - cdi
      - jaxrs
      - messaging
      
  - name: "Spring Boot"
    description: "Spring with javax packages for migration testing"
    url: "https://github.com/sbur4/demo-spring-javax-validation-example"
    type: "application_server"
    features:
      - servlet
      - jpa
      - cdi
      - jaxrs
      
  - name: "Payara"
    description: "Payara with javax packages for migration testing"
    url: "https://github.com/manouti/javaee-datasource"
    type: "application_server"
    features:
      - servlet
      - jpa
      - cdi
      - jaxrs

  - name: "Jetty"
    description: "Jetty with javax packages for migration testing"
    url: "https://github.com/ismailfer/java-jetty10-websocket-javax"
    type: "application_server"
    features:
      - jetty

  - name: "Spring"
    description: "Spring2 with javax dependency"
    url: "https://github.com/EAG-es/spring2_oauth2_example"
  

# =============================================================================
# JAVAX PACKAGE EXAMPLES
# =============================================================================
javax_packages:
  - name: "javax-validation"
    description: "application using javax.validation package"
    url: "https://github.com/asniii/JavaxValidation"
    type: "javax_package"
    features:
      - validation
      
  - name: "Servlet example"
    description: "Basic servlet using javax.servlet package"
    url: "https://github.com/javaee-samples/javaee7-samples/tree/main/jakartamigration/servlet"
    type: "javax_package"
    features:
      - servlet
      - jsp
      
  - name: "Mail javax examples"
    description: "Mail library using javax packages"
    url: "https://github.com/AlsGomes/SendMailExample-using-javax.mail"
    type: "javax_package"
    features:
      - mail

  - name: "RS javax examples"
    description: "RS library using javax packages"
    url: "https://github.com/vavasilva/ExampleJsonJavaxRS"
    type: "javax_package"
    features:
      - rs
  - name: "WS javax examples"
    description: "WS library using javax packages"
    url: "https://github.com/cvonheeren/RestJavaxwsExample"
    type: "javax_package"
    features:
      - ws

  - name: "JPA example"
    description: "JPA library using javax"
    url: "https://github.com/tomdantuit/jpa-attribute-converter"
    type: "javax_package"
  

# =============================================================================
# BUILD SYSTEM EXAMPLES
# =============================================================================
build_systems:
  - name: "Maven"
    description: "Maven project using javax packages"
    url: "https://github.com/mkyong/maven-examples"
    type: "build_system"
    features:
      - maven

  - name: "Gradle"
    description: "Gradle project using javax packages"
    url: "https://github.com/pkainulainen/gradle-examples"
    type: "build_system"
    features:
      - gradle

  - name: "No Build System"
    description: " Project with no build system using javax packages"
    url: "https://github.com/?/javaee-legacy-app-example-master"
    type: "build_system"
    features:
      - none

# =============================================================================
# DEPENDENCY EXAMPLES
# =============================================================================
dependency_types:
  - name: "Direct Dependencies"
    description: "Project with direct javax dependencies"
    url: "https://github.com/javaee-samples/javaee7-samples/tree/main/jakartamigration/validation"
    type: "dependency_pattern"
    features:
      - direct
      - maven
      - spring
      
  - name: "Transitive Dependencies"
    description: "Project with deep transitive javax dependencies"
    url: "https://github.com/javaee-samples/javaee7-samples/tree/main/jakartamigration/validation"
    type: "dependency_pattern"
    features:
      - transitive
      - spring_boot
      - web
      
  - name: "Organizational Dependencies"
    description: "Enterprise project with complex dependency structure"
    url: "https://github.com/javaee-samples/javaee7-samples/tree/main/jakartamigration/validation"
    type: "dependency_pattern"
    features:
      - organizational
      - maven
      - multi_module
